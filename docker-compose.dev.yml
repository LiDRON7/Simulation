services:
  drone-dev:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: drone_sim_dev
    network_mode: host
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - XAUTHORITY=/tmp/.docker.xauth   # pass the xauth cookie file in
      - GZ_SIM_RESOURCE_PATH=/drone_sim/models:/drone_sim/worlds
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /tmp/.docker.xauth:/tmp/.docker.xauth:rw   # generated by run.sh
      - ./models:/drone_sim/models
      - ./worlds:/drone_sim/worlds
      - ./config:/drone_sim/config
      - ./scripts:/drone_sim/scripts
      - ./ros2_ws:/drone_sim/ros2_ws
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, utility, compute, graphics, display]
