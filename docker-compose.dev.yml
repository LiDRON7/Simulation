services:
  drone-dev:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: drone_sim_dev
    # Use host networking — simplest way to pass DISPLAY through on Ubuntu
    network_mode: host
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
    volumes:
      # X11 socket so Gazebo GUI can render on your screen
      - /tmp/.X11-unix:/tmp/.X11-unix
      # Your workspace (create this folder if it doesn't exist yet)
      - ./ros2_ws:/ros2_ws
    # Allow GPU access (optional but recommended for Gazebo rendering)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, utility, compute, graphics, display]
