services:
  drone-dev:
    platform: linux/amd64
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    image: ghcr.io/${GITHUB_REPOSITORY:-your-org/drone-sim}:dev
    container_name: drone_sim_dev
    privileged: true

    environment:
      - ENABLE_VNC=${ENABLE_VNC:-true}
      - VNC_PASSWORD=${VNC_PASSWORD:-px4vnc}
      - DISPLAY=${DISPLAY}
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - PX4_SYS_AUTOSTART=4006
      - PX4_GZ_MODEL=hexacopter
      - PX4_GZ_WORLD=outdoor_obstacles

    ports:
      - "5900:5900"
      - "14550:14550/udp"
      - "14540:14540/udp"
      - "8888:8888"

    volumes:
      - ./models:/drone_sim/models
      - ./worlds:/drone_sim/worlds
      - ./config:/drone_sim/config
      - ./scripts:/drone_sim/scripts
      - ./ros2_ws:/drone_sim/ros2_ws
      - px4_build_cache:/px4/build

    devices:
      - /dev/bus/usb:/dev/bus/usb

    networks:
      - drone_net

    stdin_open: true
    tty: true

volumes:
  px4_build_cache:

networks:
  drone_net:
    driver: bridge
